name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    # Guard against runaway/hung tests.
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v3

    - name: Check lints
      run: cargo clippy --workspace --all-targets -- -D warnings

    - name: Run tests
      run: cargo test --workspace --verbose

  # Formatting is currently advisory: the codebase predates a rustfmt pass.
  # Run `cargo fmt` and commit it to make this a hard gate.
  format:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v3
    - name: Check formatting
      run: cargo fmt --check